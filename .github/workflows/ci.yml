name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  cli:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v5

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Type check
        run: npx tsc --noEmit

      - name: Test
        run: npm test

      - name: CLI smoke test
        run: |
          node dist/bin/lockstep.js --version
          node dist/bin/lockstep.js --help
          node dist/bin/lockstep.js templates
          node dist/bin/lockstep.js validate templates/blank.yml

  sdk:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    defaults:
      run:
        working-directory: sdk

    steps:
      - uses: actions/checkout@v5

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: sdk/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test
